---
kind: Model
metadata:
  name: Network
spec:
  runtime:
    dynlib:
      - os: linux
        arch: amd64
        path: lib/network.so
      - os: linux
        arch: x86
        path: lib/network.so
      - os: linux
        arch: i386
        path: lib/network.so
      - os: windows
        arch: x64
        path: bin/network.dll
      - os: windows
        arch: x86
        path: bin/network.dll
  channels:
    - alias: signal_channel
      selectors:
        channel: signal_vector
    - alias: network_channel
      selectors:
        channel: network_vector
