version: '3'

metadata:
  package:
    download: '{{.REPO}}/releases/download/v{{.TAG}}/Network-{{.TAG}}-{{.PLATFORM_ARCH}}.zip'
    file: 'dse/network/build/_dist/Network-{{coalesce .TAG .PACKAGE_VERSION "not-specified"}}-{{.PLATFORM_ARCH}}.zip'
  container:
    repository:
  models:
    dse.network:
      name: network
      displayName: dse.network
      path: ''
      mcl: false
      workflows:
        - generate
      platforms:
        - linux-amd64
        - linux-x86
        - linux-i386
        - windows-x64
        - windows-x86
      channels:
        - alias: signal_channel
        - alias: network_channel


vars:
  # When running from E2E tests (i.e. Docker in Docker), the NETWORK_SIMDIR (for
  # Docker commands) must be set to the host relative path.
  NETWORK_SIMDIR: '{{if .SIM}}{{.ENTRYWORKDIR}}/{{.SIM}}{{else}}{{.PWD}}{{end}}'
  # Container image specification.
  NETWORK_REPO: 'https://github.com/boschglobal/dse.network'
  NETWORK_REGISTRY: ghcr.io/boschglobal
  GCC_IMAGE: ghcr.io/boschglobal/dse-gcc-builder:latest
  NETWORK_USER:
    sh: id -u
  NETWORK_GROUP:
    sh: id -g

tasks:

  info:
    run: always
    dir: '{{.USER_WORKING_DIR}}'
    label: dse:network:info
    vars:
      NETWORK_IMAGE: '{{if .NETWORK_IMAGE}}{{.NETWORK_IMAGE}}{{else}}{{.NETWORK_REGISTRY}}/dse-network:{{.TAG | default "latest"}}{{end}}'
    cmds:
      - echo NETWORK_SIMDIR={{.NETWORK_SIMDIR}}
      - echo NETWORK_IMAGE={{.NETWORK_IMAGE}}
      - echo PACKAGE_VERSION={{.PACKAGE_VERSION}}
      - echo PLATFORM_ARCH={{.PLATFORM_ARCH}}
      - echo NETWORK_REPO={{.NETWORK_REPO}}
      - echo TAG={{.TAG}}

  generate:
    run: always
    dir: '{{.USER_WORKING_DIR}}'
    label: dse:network:generate-{{.DBCFILE}}
    vars:
      SIGNAL: '{{.SIGNAL | default "SIGNAL_NOT_SPECIFIED"}}'
      MIMETYPE: '{{.MIMETYPE | default "MIMETYPE_NOT_SPECIFIED"}}'
      DBCFILE: '{{.DBCFILE | default "DBCFILE_NOT_SPECIFIED"}}'
      ARXML: '{{.ARXML | default ""}}'
      DBCDIR:
        sh: dirname {{.DBCFILE}}
      OUTDIR: '{{default .DBCDIR .OUTDIR}}'
      PLATFORM_OS: '{{.PLATFORM_OS | default "linux"}}'
      PLATFORM_ARCH: '{{.PLATFORM_ARCH | default "x64"}}'
    cmds:
      - task: "{{if .ARXML}}convert-arxml{{else}}generate-dbc{{end}}"
        vars:
          DBCFILE: '{{.DBCFILE | default "DBCFILE_NOT_SPECIFIED"}}'
    requires:
      vars: [DBCFILE, SIGNAL, MIMETYPE]
    sources:
      - '{{.PWD}}/{{.DBCFILE}}'
      - '{{.PWD}}/{{.ARXML}}'
    generates:
      - '{{.PWD}}/{{.OUTDIR}}/**'
    metadata:
      vars:
        SIGNAL:
          required: true
          hint: Network signal representing the CAN Network.
          default: can
        MIMETYPE:
          required: true
          hint: Mime Type of the CAN Network.
          default: "application/x-automotive-bus; interface=stream; type=frame; bus=can; schema=fbs; bus_id=1; node_id=2; interface_id=3"
        DBCFILE:
          required: true
          hint: Path to CAN DBC file.
        ARXML:
          required: false
          hint: Path to arxml file.
        DBCDIR:
          required: false
          hint: Path to where CAN DBC file is present.
        OUTDIR:
          required: false
          hint: Path to the generated files.
          default: '{{.PATH}}/data'
        PLATFORM_OS:
          required: false
          hint: Target operating system for the platform.
          default: linux
        PLATFORM_ARCH:
          required:
          hint: Target architecture for the platform.
          default: x64

  convert-arxml:
    internal: true
    run: always
    dir: '{{.USER_WORKING_DIR}}'
    label: dse:network:generate-{{.ARXML}}
    vars:
      NETWORK_IMAGE: '{{if .NETWORK_IMAGE}}{{.NETWORK_IMAGE}}{{else}}{{.NETWORK_REGISTRY}}/dse-network:{{.TAG | default "latest"}}{{end}}'
      ARXML: '{{.ARXML | default "ARXML_NOT_SPECIFIED"}}'
      DBCDIR:
        sh: dirname {{.ARXML}}
      OUTDIR: '{{default .DBCDIR .OUTDIR}}'
      SIGNAL: '{{.SIGNAL | default "SIGNAL_NOT_SPECIFIED"}}'
      MIMETYPE: '{{.MIMETYPE | default "MIMETYPE_NOT_SPECIFIED"}}'
      NETOFF_SIGNAL: '{{.NETOFF_SIGNAL | default ""}}'
    cmds:
      - docker run --rm -v {{.NETWORK_SIMDIR}}:/sim {{.NETWORK_IMAGE}} convert-arxml {{.ARXML}} {{.OUTDIR}}
      - task: find-dbc
    requires:
      vars: [ARXML, SIGNAL, MIMETYPE]
    sources:
      - '{{.PWD}}/{{.ARXML}}'
    generates:
      - '{{.PWD}}/{{.OUTDIR}}/**'

  find-dbc:
    internal: true
    run: always
    dir: '{{.USER_WORKING_DIR}}'
    label: dse:network:generate-{{.ARXML}}
    vars:
      NETWORK_IMAGE: '{{if .NETWORK_IMAGE}}{{.NETWORK_IMAGE}}{{else}}{{.NETWORK_REGISTRY}}/dse-network:{{.TAG | default "latest"}}{{end}}'
      SIGNAL: '{{.SIGNAL | default "SIGNAL_NOT_SPECIFIED"}}'
      MIMETYPE: '{{.MIMETYPE | default "MIMETYPE_NOT_SPECIFIED"}}'
      ARXML: '{{.ARXML | default "ARXML_NOT_SPECIFIED"}}'
      DBCDIR:
        sh: dirname {{.ARXML}}
      OUTDIR: '{{default .DBCDIR .OUTDIR}}'
      NETOFF_SIGNAL: '{{.NETOFF_SIGNAL | default ""}}'
      DBC:
        sh: find {{.OUTDIR}} -type f \( -name '*.dbc' -o -name '*.DBC' \)
    cmds:
      - for:
          var: DBC
        task: generate-dbc
        vars:
          DBCFILE: '{{.ITEM}}'
    requires:
      vars: [ARXML, SIGNAL, MIMETYPE]
    sources:
      - '{{.PWD}}/{{.ARXML}}'
    generates:
      - '{{.PWD}}/{{.OUTDIR}}/**'

  generate-dbc:
    internal: true
    run: always
    dir: '{{.USER_WORKING_DIR}}'
    label: dse:network:generate-{{.DBCFILE}}
    vars:
      SIGNAL: '{{.SIGNAL | default "SIGNAL_NOT_SPECIFIED"}}'
      MIMETYPE: '{{.MIMETYPE | default "MIMETYPE_NOT_SPECIFIED"}}'
      DBCFILE: '{{.DBCFILE | default "DBCFILE_NOT_SPECIFIED"}}'
      DBCDIR:
        sh: dirname {{.DBCFILE}}
      OUTDIR: '{{default .DBCDIR .OUTDIR}}'
      NETOFF_SIGNAL: '{{.NETOFF_SIGNAL | default ""}}'
    cmds:
      - task: gen-code
        vars:
          DBCFILE: '{{.DBCFILE}}'
          OUTDIR: '{{.OUTDIR}}'
          FILTER: '{{.FILTER}}'
      - task: build-message-lib
        vars:
          DBCFILE: '{{.DBCFILE}}'
          OUTDIR: '{{.OUTDIR}}'
          PLATFORM_OS: '{{.PLATFORM_OS}}'
          PLATFORM_ARCH: '{{.PLATFORM_ARCH}}'
          MESSAGE_LIB: '{{.MESSAGE_LIB}}'
      - task: gen-network
        vars:
          DBCFILE: '{{.DBCFILE}}'
          OUTDIR: '{{.OUTDIR}}'
          MESSAGE_LIB: '{{.MESSAGE_LIB}}'
          FUNCTION_LIB: '{{.FUNCTION_LIB}}'
          STYLE: '{{.STYLE | default "snake_case"}}'
      - task: patch-network
        vars:
          DBCFILE: '{{.DBCFILE}}'
          OUTDIR: '{{.OUTDIR}}'
          FUNCTION_PATCH: '{{.FUNCTION_PATCH}}'
      - task: gen-signalgroup
        vars:
          DBCFILE: '{{.DBCFILE}}'
          OUTDIR: '{{.OUTDIR}}'
          SIGNAL: '{{.SIGNAL}}'
          MIMETYPE: '"{{.MIMETYPE}}"'
    requires:
      vars: [DBCFILE, SIGNAL, MIMETYPE]
    sources:
      - '{{.PWD}}/{{.DBCFILE}}'
    generates:
      - '{{.PWD}}/{{.OUTDIR}}/**'

  gen-code:
    internal: true
    run: when_changed
    dir: '{{.USER_WORKING_DIR}}'
    label: dse:network:gen-code-{{.DBCFILE}}
    vars:
      NETWORK_IMAGE: '{{if .NETWORK_IMAGE}}{{.NETWORK_IMAGE}}{{else}}{{.NETWORK_REGISTRY}}/dse-network:{{.TAG | default "latest"}}{{end}}'
      DBCFILE: '{{.DBCFILE | default "DBCFILE_NOT_SPECIFIED"}}'
      DBCNAME:
        sh: basename {{.DBCFILE}} .dbc
      OUTDIR: '{{.OUTDIR | default "OUTDIR_NOT_SPECIFIED"}}'
      FILTER: '{{if .FILTER}}--filter {{.FILTER}}{{else}}{{end}}'
      CYCLE_TIME: "{{if .CYCLE_TIME}}--cycle_time '{{.CYCLE_TIME}}'{{else}}{{end}}"
    cmds:
      - docker run --rm -v {{.NETWORK_SIMDIR}}:/sim {{.NETWORK_IMAGE}} gen-code
          {{.DBCFILE}} {{.OUTDIR}}
          {{.FILTER}}
          {{.CYCLE_TIME}}
    requires:
      vars: [DBCFILE, OUTDIR]
    sources:
      - '{{.PWD}}/{{.DBCFILE}}'
    generates:
      - '{{.PWD}}/{{.OUTDIR}}/{{.DBCNAME}}.h'
      - '{{.PWD}}/{{.OUTDIR}}/{{.DBCNAME}}.c'
      - '{{.PWD}}/{{.OUTDIR}}/{{.DBCNAME}}.yaml'

  build-message-lib:
    internal: true
    run: when_changed
    dir: '{{.USER_WORKING_DIR}}'
    label: dse:network:build-message-lib-{{.DBCFILE}}
    vars:
      DBCFILE: '{{.DBCFILE | default "DBCFILE_NOT_SPECIFIED"}}'
      DBCNAME:
        sh: basename {{.DBCFILE}} .dbc
      OUTDIR: '{{.OUTDIR | default "OUTDIR_NOT_SPECIFIED"}}'
      MESSAGE_LIB: '{{.MESSAGE_LIB | default "message.so"}}'
      SOURCE_FILE: '{{.OUTDIR}}/{{.DBCNAME}}.c'
      OBJECT_FILE: '{{.OUTDIR}}/{{.DBCNAME}}.o'
      MESSAGE_LIB_FILE: '{{.OUTDIR}}/{{.MESSAGE_LIB}}'
      ARCH_FLAGS: '{{if eq .PLATFORM_ARCH "x86"}}-mx32{{else}}{{end}}'
      GCC_TOOLCHAIN_PREFIX: '{{if eq .PLATFORM_OS "windows"}}x86_64-w64-mingw32-{{else}}{{end}}'
    cmds:
      - docker run --rm -v {{.NETWORK_SIMDIR}}:/sim -w /sim {{.GCC_IMAGE}}
          {{.GCC_TOOLCHAIN_PREFIX}}gcc {{.ARCH_FLAGS}} -c -Wall -Werror -fpic -o {{.OBJECT_FILE}} {{.SOURCE_FILE}}
      - docker run --rm -v {{.NETWORK_SIMDIR}}:/sim -w /sim {{.GCC_IMAGE}}
          {{.GCC_TOOLCHAIN_PREFIX}}gcc {{.ARCH_FLAGS}} -shared -o {{.MESSAGE_LIB_FILE}} {{.OBJECT_FILE}}
    requires:
      vars: [DBCFILE, OUTDIR]
    sources:
      - '{{.PWD}}/{{.DBCFILE}}'
      - '{{.PWD}}/{{.SOURCE_FILE}}'
    generates:
      - '{{.PWD}}/{{.MESSAGE_LIB_FILE}}'

  gen-network:
    internal: true
    run: when_changed
    dir: '{{.USER_WORKING_DIR}}'
    label: dse:network:gen-network-{{.DBCFILE}}
    vars:
      NETWORK_IMAGE: '{{if .NETWORK_IMAGE}}{{.NETWORK_IMAGE}}{{else}}{{.NETWORK_REGISTRY}}/dse-network:{{.TAG | default "latest"}}{{end}}'
      DBCFILE: '{{.DBCFILE | default "DBCFILE_NOT_SPECIFIED"}}'
      DBCNAME:
        sh: basename {{.DBCFILE}} .dbc
      OUTDIR: '{{.OUTDIR | default "OUTDIR_NOT_SPECIFIED"}}'
      NETWORK_FILE: '{{.OUTDIR}}/network.yaml'
      HEADER_FILE: '{{.OUTDIR}}/{{.DBCNAME}}.h'
      METADATA_FILE: '{{.OUTDIR}}/{{.DBCNAME}}.yaml'
      MESSAGE_LIB: '{{.MESSAGE_LIB | default "message.so"}}'
      FUNCTION_LIB: '{{if .FUNCTION_LIB}}--function_lib {{.FUNCTION_LIB}}{{else}}{{end}}'
      NETOFF_SIGNAL: '{{if .NETOFF_SIGNAL}}--netoff_signal {{.NETOFF_SIGNAL}}{{else}}{{end}}'
      LABELS: '{{if .LABELS}}--labels {{.LABELS}}{{else}}{{end}}'
      ANNOTATIONS: '{{if .ANNOTATIONS}}--annotations {{.ANNOTATIONS}}{{else}}{{end}}'
      STYLE: '{{if .STYLE}}--style {{.STYLE}}{{else}}{{end}}'
    cmds:
      - docker run --rm -v {{.NETWORK_SIMDIR}}:/sim {{.NETWORK_IMAGE}} gen-network
          --name {{.DBCNAME}}
          --header {{.HEADER_FILE}}
          --network {{.NETWORK_FILE}}
          --metadata {{.METADATA_FILE}}
          --message_lib {{.OUTDIR}}/{{.MESSAGE_LIB}}
          {{.STYLE}}
          {{.FUNCTION_LIB}}
          {{.NETOFF_SIGNAL}}
          {{.LABELS}}
          {{.ANNOTATIONS}}
    requires:
      vars: [DBCFILE, OUTDIR]
    sources:
      - '{{.PWD}}/{{.DBCFILE}}'
      - '{{.PWD}}/{{.HEADER_FILE}}'
      - '{{.PWD}}/{{.METADATA_FILE}}'
    generates:
      - '{{.PWD}}/{{.NETWORK_FILE}}'

  patch-network:
    internal: true
    run: when_changed
    dir: '{{.USER_WORKING_DIR}}'
    label: dse:network:patch-network-{{.DBCFILE}}
    vars:
      NETWORK_IMAGE: '{{if .NETWORK_IMAGE}}{{.NETWORK_IMAGE}}{{else}}{{.NETWORK_REGISTRY}}/dse-network:{{.TAG | default "latest"}}{{end}}'
      DBCFILE: '{{.DBCFILE | default "DBCFILE_NOT_SPECIFIED"}}'
      OUTDIR: '{{.OUTDIR | default "OUTDIR_NOT_SPECIFIED"}}'
      NETWORK_FILE: '{{.OUTDIR}}/network.yaml'
      FUNCTION_PATCH: '{{if .FUNCTION_PATCH}}--function_patch {{.FUNCTION_PATCH}}{{else}}{{end}}'
      SIGNAL_PATCH: '{{if .SIGNAL_PATCH}}--signal_patch {{.SIGNAL_PATCH}}{{else}}{{end}}'
      REMOVE_UNKNOWN: '{{if .REMOVE_UNKNOWN}}--remove_unknown{{else}}{{end}}'
    cmds:
      - if test -n '{{.FUNCTION_PATCH}}' || test -n '{{.SIGNAL_PATCH}}' ; then
          docker run --rm -v {{.NETWORK_SIMDIR}}:/sim {{.NETWORK_IMAGE}} patch-network
            --network {{.NETWORK_FILE}}
            {{.FUNCTION_PATCH}}
            {{.SIGNAL_PATCH}}
            {{.REMOVE_UNKNOWN}}
        ; else echo "patch-network skipped"; fi
    requires:
      vars: [DBCFILE, OUTDIR]
    sources:
      - '{{.PWD}}/{{.DBCFILE}}'
      - '{{.PWD}}/{{.NETWORK_FILE}}'
    generates:
      - '{{.PWD}}/{{.NETWORK_FILE}}'

  gen-signalgroup:
    internal: true
    run: when_changed
    dir: '{{.USER_WORKING_DIR}}'
    label: dse:network:gen-signalgroup-{{.DBCFILE}}
    vars:
      NETWORK_IMAGE: '{{if .NETWORK_IMAGE}}{{.NETWORK_IMAGE}}{{else}}{{.NETWORK_REGISTRY}}/dse-network:{{.TAG | default "latest"}}{{end}}'
      SIGNAL: '{{.SIGNAL | default "SIGNAL_NOT_SPECIFIED"}}'
      MIMETYPE: '{{.MIMETYPE | default "MIMETYPE_NOT_SPECIFIED"}}'
      DBCFILE: '{{.DBCFILE | default "DBCFILE_NOT_SPECIFIED"}}'
      DBCNAME:
        sh: basename {{.DBCFILE}} .dbc
      OUTDIR: '{{.OUTDIR | default "OUTDIR_NOT_SPECIFIED"}}'
      NETWORK_FILE: '{{.OUTDIR}}/network.yaml'
      SIGGROUP_FILE: '{{.OUTDIR}}/signalgroup.yaml'
      LABELS: '{{if .LABELS}}--labels {{.LABELS}}{{else}}{{end}}'
    cmds:
      - docker run --rm -v {{.NETWORK_SIMDIR}}:/sim {{.NETWORK_IMAGE}} gen-signalgroup
          --name {{.DBCNAME}}
          --network {{.NETWORK_FILE}}
          --signalgroup {{.SIGGROUP_FILE}}
          --signal {{.SIGNAL}}
          --mimetype {{.MIMETYPE}}
          {{.LABELS}}
    requires:
      vars: [DBCFILE, OUTDIR, SIGNAL, MIMETYPE]
    sources:
      - '{{.PWD}}/{{.DBCFILE}}'
      - '{{.PWD}}/{{.NETWORK_FILE}}'
    generates:
      - '{{.PWD}}/{{.SIGGROUP_FILE}}'

  set-mimetype:
    internal: true
    run: when_changed
    dir: '{{.USER_WORKING_DIR}}'
    label: dse:network:set-mimetype-{{.DBCFILE}}
    vars:
      NETWORK_IMAGE: '{{if .NETWORK_IMAGE}}{{.NETWORK_IMAGE}}{{else}}{{.NETWORK_REGISTRY}}/dse-network:{{.TAG | default "latest"}}{{end}}'
      SIGNAL: '{{.SIGNAL | default "SIGNAL_NOT_SPECIFIED"}}'
      MIMETYPE: '{{.MIMETYPE | default "MIMETYPE_NOT_SPECIFIED"}}'
      OUTDIR: '{{.OUTDIR | default "OUTDIR_NOT_SPECIFIED"}}'
    cmds:
      - docker run --rm -v {{.NETWORK_SIMDIR}}:/sim {{.NETWORK_IMAGE}} set-mimetype
          --output_directory {{.OUTDIR}}
          --signal {{.SIGNAL}}
          --mimetype "{{.MIMETYPE}}"
    requires:
      vars: [OUTDIR, SIGNAL, MIMETYPE]
